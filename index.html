<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🌙 おやすみルーティン</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <h1>🌙 おやすみルーティン</h1>
    <div class="header-btns">
      <button class="icon-btn" id="edit-btn" title="タスク編集">✏️</button>
      <button class="icon-btn" id="settings-btn" title="設定">⚙️</button>
    </div>
  </header>

  <!-- STAGE -->
  <div class="stage-card">
    <div class="stage-scene" id="stage-scene">
      <!-- Sky -->
      <div class="stage-sky" id="stage-sky">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="stars" id="stars"></div>
        <div class="moon" id="moon">🌙</div>
      </div>
      <!-- Ground -->
      <div class="stage-ground" id="stage-ground">
        <div class="tired-overlay" id="tired-overlay"></div>
        <div class="track" id="track">
          <!-- task markers injected by JS -->
          <!-- characters injected by JS -->
        </div>
      </div><!-- /stage-ground -->
      <div class="event-layer" id="event-layer"></div>
    </div><!-- /stage-scene -->
    <!-- Time bar -->
    <div class="stage-timebar">
      <div class="timebar-start" id="timebar-start">--:--</div>
      <div class="timebar-center">
        <div class="timebar-label">残り</div>
        <div class="timebar-value" id="time-remaining-value">--:--</div>
      </div>
      <div class="timebar-end" id="timebar-end">21:30まで</div>
    </div>
  </div>

  <!-- TASK LIST -->
  <div class="list-card">
    <div class="list-header">
      <div class="list-header-task">タスク</div>
      <div class="avatar-col">
        <span class="avatar-emoji">👧</span>
        <span class="avatar-name" id="name1-display">AK</span>
      </div>
      <div class="avatar-col">
        <span class="avatar-emoji">👦</span>
        <span class="avatar-name" id="name2-display">DI</span>
      </div>
    </div>
    <div id="task-list-body"></div>
    <!-- Fixed goodnight row -->
    <div class="task-row goodnight-row" id="goodnight-row">
      <span class="task-label">🌙 グッドナイト！</span>
      <div class="check-col">
        <div class="checkbox-wrapper" data-task="goodnight" data-player="0">
          <div class="checkbox"></div>
        </div>
      </div>
      <div class="check-col">
        <div class="checkbox-wrapper" data-task="goodnight" data-player="1">
          <div class="checkbox"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- COMPLETION NOTICE -->
  <div id="completion-notice" class="hidden">
    <span class="completion-emoji">🎉</span>
    全部おわった！ゲームタイム！ 🎮✨
  </div>

</div><!-- .app -->

<!-- Confetti -->
<canvas id="confetti-canvas"></canvas>

<!-- SETTINGS MODAL -->
<div class="modal-overlay hidden" id="settings-modal">
  <div class="modal-box">
    <div class="modal-title">⚙️ 設定</div>
    <label class="modal-label">就寝時刻</label>
    <input class="modal-input" type="time" id="target-time-input" value="21:00" />
    <label class="modal-label">👧 お姉ちゃんの名前</label>
    <input class="modal-input" type="text" id="name1-input" placeholder="AK" maxlength="10" />
    <label class="modal-label">👦 弟の名前</label>
    <input class="modal-input" type="text" id="name2-input" placeholder="DI" maxlength="10" />
    <div class="modal-actions">
      <button class="btn btn-secondary" id="close-settings">キャンセル</button>
      <button class="btn btn-primary" id="save-settings">保存</button>
    </div>
  </div>
</div>

<!-- EDIT TASKS MODAL -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal-box edit-modal-box">
    <div class="modal-title">✏️ タスク編集</div>
    <div class="edit-task-list" id="edit-task-list"></div>
    <button class="add-task-btn" id="add-task-btn">＋ タスク追加</button>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="close-edit">キャンセル</button>
      <button class="btn btn-primary" id="save-edit">保存</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
